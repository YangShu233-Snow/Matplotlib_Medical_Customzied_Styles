name: Python Testing

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint Python with ruff
      run: |
        ruff check .

    - name: Lint Markdown with markdownlint-cli
      run: |
        npx --yes markdownlint-cli@0.48.0 'styles/*/readme.md' README.md CONTRIBUTING.md llms.md AGENTS.md

    - name: Run tests with pytest
      run: |
        pytest -v